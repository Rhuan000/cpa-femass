services:
  postgres:
    image: postgres:16-alpine
    container_name: cpa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cpa-femass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Cp2af0em2as6s
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cpa-femass"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.compose
    container_name: cpa-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/cpa-femass
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: Cp2af0em2as6s
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
    ports:
      - "8080:8080"

volumes:
  postgres_data:

